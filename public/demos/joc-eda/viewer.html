<html>
<head>
  <title>The Purge — EDA Game Viewer</title>
  <style>
    html, body {
      font-family: sans-serif;
      font-size: 12pt;
      background-color: #0a0a0f;
      color: white;
      width: 100%;
      height: 100%;
      margin: 0px;
      overflow: hidden;
    }
    .score {
      min-width: 100px;
      margin-right: 25px;
      display: inline-block;
      text-align: left;
      font-size: 11pt;
    }
    .button { cursor: pointer; }
  </style>
  <link type='text/css' href='css/ui-lightness/jquery-ui-1.8.18.custom.css' rel='Stylesheet' />
  <script type='text/javascript' src='js/jquery-1.7.1.min.js'></script>
  <script type='text/javascript' src='js/jquery-ui-1.8.18.custom.min.js'></script>
  <script type='text/javascript' src='./viewer.js'></script>
  <script>
    var _origInit = window.init;
    window.init = function() {
      // Check for custom game data from sessionStorage (user upload)
      var params = new URLSearchParams(location.search);
      if (params.get('custom') === '1') {
        var customData = sessionStorage.getItem('joc_eda_custom_game');
        if (customData) {
          sessionStorage.removeItem('joc_eda_custom_game');
          document.getElementById("loadingdiv").style.display = "";
          initGame(customData);
          return;
        }
      }
      // Check for ?game= URL parameter
      var game = params.get('game');
      if (game) {
        _origInit();
        return;
      }
      // Default: load sample.out
      document.getElementById("loadingdiv").style.display = "";
      var xhr = new XMLHttpRequest();
      xhr.open("GET", "sample.out", true);
      xhr.onload = function() {
        if (xhr.status === 200 && xhr.responseText.length > 0) {
          initGame(xhr.responseText);
        } else {
          document.getElementById("loadingdiv").innerHTML =
            "<p style='color:#f87171'>Failed to load game (status: " + xhr.status + ")</p>";
        }
      };
      xhr.onerror = function() {
        document.getElementById("loadingdiv").innerHTML =
          "<p style='color:#f87171'>Network error loading game file</p>";
      };
      xhr.send();
    };
  </script>
</head>
<body onload="init()">
  <div id="scores" style="position:absolute; top:100px; margin:60px;"></div>
  <center id="inputdiv" style="display:none;">
    <br/><br/>
    <div style="margin-bottom: 20px;">Select a game file to load:</div>
    <input type="file" id="file" name="file" />
  </center>
  <center id='loadingdiv' style="display:none; margin-top:200px;">
    <p>Please wait, loading game.</p>
  </center>
  <center id="gamediv" style="display:none;">
    <br/><br/>
    <div style='width:500px; height:32px;'>
      <div style='float:left;'>
        <img id='but_play' class='button' title="Play (space)" src='img/but_play.png' height='32' width='32' onclick='playButton();' />
        <img id='but_pause' class='button' title="Pause (space)" src='img/but_pause.png' height='32' width='32' onclick='pauseButton();'/>
        <img id='but_start' class='button' title="Go to start" src='img/but_start.png' height='32' width='32' onclick='startButton();' />
        <img id='but_end' class='button' title="Go to end" src='img/but_end.png' height='32' width='32' onclick='endButton();' />
        <img id='but_anim' class='button' title="Toggle animation" src='img/but_refresh.png' height='32' width='32' onclick='animButton();' />
        <img id='but_help' class='button' title="Help (h)" src='img/but_help.png' height='32' width='32' onclick='helpButton();' />
      </div>
      <span id='round' style="position:relative; top: 10px;"> </span>
      <img style='float:right;' class='button' title="Close window" src='img/but_close.png' height='32' width='32' onclick='closeButton();' />
    </div>
    <br/>
    <div id='slider'> </div>
    <br/>
    <canvas id='myCanvas'>
      <p>Your browser does not support the HTML canvas element.</p>
    </canvas>
  </center>
</body>
</html>
