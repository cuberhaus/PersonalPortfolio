# Weekly dependency-bump PRs against main. Dependabot uses one multi-ecosystem
# group so npm and GitHub Actions version updates arrive in a single PR instead
# of one PR per package family. The PR still runs the full CI suite (quality +
# vitest + planner-api + playwright x 5 + a11y x 4 shards + lighthouse), so a
# bump that breaks the build never lands.
#
# Major-version bumps are intentionally ignored so manual review stays in
# the loop for breaking changes — the Astro 5 → 6 jump in PR #89 is the
# template for how those should land (one focused PR with a migration
# checklist, not a Dependabot drive-by).
#
# Schema note (multi-ecosystem-groups, currently public preview): when an
# `updates:` entry references a `multi-ecosystem-group`, Dependabot REQUIRES
# `patterns:` at the entry level (NOT inside a `groups:` block). The schema
# validator rejects the config otherwise:
#   "The property '#/updates/0/patterns' is required when
#    'multi-ecosystem-group' is set."
# Schedule is inherited from the group definition; do NOT add `schedule:`
# at the entry level. See:
# https://docs.github.com/en/code-security/dependabot/working-with-dependabot/dependabot-options-reference

version: 2

multi-ecosystem-groups:
  weekly-dependency-refresh:
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies

updates:
  - package-ecosystem: npm
    directory: /
    multi-ecosystem-group: weekly-dependency-refresh
    patterns:
      - '*'
    open-pull-requests-limit: 5
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
    commit-message:
      prefix: chore(deps)
      include: scope

  - package-ecosystem: github-actions
    directory: /
    multi-ecosystem-group: weekly-dependency-refresh
    patterns:
      - '*'
    open-pull-requests-limit: 3
    commit-message:
      prefix: chore(ci)
      include: scope
    labels:
      - ci
