name: Update agent skills

on:
  schedule:
    # 09:00 UTC on the 1st of each month
    - cron: '0 9 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Update pinned skills
        run: npx -y skills update -p -y
      - name: Open PR if skills-lock.json changed
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: 'chore(skills): monthly agent skills update'
          title: 'chore(skills): monthly agent skills update'
          body: |
            Automated monthly update via `npx skills update -p -y`.

            Review the `skills-lock.json` diff and any new skill READMEs before merging.
            Restore the unpacked skills locally with `make skills-restore`.
          branch: chore/skills-monthly-update
          delete-branch: true
          add-paths: |
            skills-lock.json

      - name: Enable auto-merge on the PR
        if: steps.cpr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash --delete-branch
