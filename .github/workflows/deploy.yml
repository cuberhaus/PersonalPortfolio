name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [cv-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest CV PDFs from cuberhaus/cv
        run: |
          set -e
          mkdir -p public
          BASE="https://github.com/cuberhaus/cv/releases/latest/download"
          curl -fL -o public/cv.pdf    "$BASE/cv_english.pdf"
          curl -fL -o public/cv_es.pdf "$BASE/cv_spanish.pdf"
          curl -fL -o public/cv_ca.pdf "$BASE/cv_catalan.pdf"

      - name: Build site
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
