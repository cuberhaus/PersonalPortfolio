name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [cv-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch latest CV PDFs from cuberhaus/cv
        run: |
          set -e
          mkdir -p public
          BASE="https://github.com/cuberhaus/cv/releases/latest/download"
          curl -fL -o public/cv.pdf    "$BASE/cv_english.pdf"
          curl -fL -o public/cv_es.pdf "$BASE/cv_spanish.pdf"
          curl -fL -o public/cv_ca.pdf "$BASE/cv_catalan.pdf"

      - name: Build site
        run: npm run build

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium chromium-headless-shell
          fi

      - name: Start preview server
        run: |
          npm run preview > preview.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -fs http://localhost:4321/ > /dev/null; then
              echo "Preview server up after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Capture OG images into dist/
        env:
          OG_BASE_URL: http://localhost:4321
          OG_OUT_DIR: dist
        run: npm run og:capture

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
