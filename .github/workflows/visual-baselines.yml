name: Refresh visual baselines

# Manually-triggered job that regenerates the committed visual-regression
# baselines on a Linux runner (so the snapshots match what
# `playwright-visual` will compare against in CI), then opens a PR with
# the updated PNGs. The PR's "Files changed" tab renders PNGs inline, so
# you can eyeball whether each diff is intentional before merging.
#
# Run from GitHub UI: Actions → "Refresh visual baselines" → Run workflow.

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium chromium-headless-shell
          fi

      - name: Build site
        run: npm run build

      - name: Capture baselines (--update-snapshots)
        run: npx playwright test --project=visual --update-snapshots

      - name: Open PR with refreshed baselines
        uses: peter-evans/create-pull-request@v8
        with:
          # Default GITHUB_TOKEN is fine; the auto-PR's checks won't run
          # Pages deploy (which needs id-token), but the test suite + the
          # playwright-visual job will, which is what matters for review.
          branch: visual/refresh-baselines
          delete-branch: true
          add-paths: e2e/visual.spec.ts-snapshots/
          commit-message: |
            test(visual): refresh baseline screenshots

            Regenerated by the `Refresh visual baselines` workflow.
            Each PNG diff in this PR represents either intentional UI
            drift (merge) or an unexpected regression (block + investigate).
          title: 'test(visual): refresh baseline screenshots'
          body: |
            Auto-generated by the `Refresh visual baselines` workflow.

            Each PNG that changed corresponds to a route whose rendering
            shifted since the last baseline. Review the "Files changed"
            tab — GitHub renders PNG diffs inline so intentional changes
            are easy to eyeball.

            **Merge** if the diffs match an intended design change.
            **Close** the PR and investigate if you see drift you didn't ship.

            Triggered by: @${{ github.actor }}
          labels: |
            visual-regression
            automated
